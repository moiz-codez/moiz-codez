<svg viewBox="0 0 1000 680" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="System map: terminal tools, web and data platforms, iOS apps, research, all from one pipeline">
  <style>
    :root {
      --bone: #444444; --muted: #888888; --dim: #AAAAAA; --rule: #C0C0C0;
      --node-bg: #F0F0F0; --core-bg: #E8E8E8; --accent: #555555;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bone: #DDDDDD; --muted: #777777; --dim: #666666; --rule: #444444;
        --node-bg: #1A1A1A; --core-bg: #222222; --accent: #AAAAAA;
      }
    }
    .mono { font-family: ui-monospace, "SFMono-Regular", "SF Mono", Menlo, Consolas, "Liberation Mono", monospace; }
    .node { fill: none; stroke: var(--rule); stroke-width: 1; }
    .nodeC { fill: none; stroke: var(--rule); stroke-width: 1; }
    .wire { stroke: var(--rule); stroke-width: 1; stroke-dasharray: 500; stroke-dashoffset: 500; animation: draw 1.6s cubic-bezier(.6,0,.2,1) forwards; }
    @keyframes draw { to { stroke-dashoffset: 0; } }
    .w1{animation-delay:.2s}.w2{animation-delay:.32s}.w3{animation-delay:.44s}.w4{animation-delay:.56s}.w5{animation-delay:.68s}.w6{animation-delay:.8s}.w7{animation-delay:.92s}.w8{animation-delay:1.04s}.w9{animation-delay:1.16s}
    .flow { stroke: var(--muted); stroke-width: 1; opacity: .2; stroke-dasharray: 3 9; animation: march 1.4s linear infinite; }
    @keyframes march { to { stroke-dashoffset: -12; } }
    .pop { opacity: 0; animation: pop .7s cubic-bezier(.2,.7,.2,1) forwards; }
    @keyframes pop { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
    .p0{animation-delay:.1s}.p1{animation-delay:.9s}.p2{animation-delay:1.0s}.p3{animation-delay:1.1s}.p4{animation-delay:1.2s}.p5{animation-delay:1.3s}.p6{animation-delay:1.4s}.p7{animation-delay:1.5s}.p8{animation-delay:1.6s}.p9{animation-delay:1.7s}.p10{animation-delay:1.9s}.p11{animation-delay:2.0s}.p12{animation-delay:2.1s}.p13{animation-delay:2.2s}
    .core { animation: breathe 3.2s ease-in-out infinite; }
    @keyframes breathe { 0%,100%{opacity:1} 50%{opacity:.55} }
    @media (prefers-reduced-motion: reduce) {
      .wire,.flow,.pop,.core { animation: none; }
      .wire{stroke-dashoffset:0} .pop{opacity:1} .flow{opacity:.1}
    }
      :root { --bone: #000000; --muted: #000000; --dim: #000000; --rule: #000000; --accent: #000000; --node-bg: #FFFFFF; --core-bg: #FFFFFF; }
  :root { --bone:#FFFFFF; --muted:#FFFFFF; --dim:#FFFFFF; --rule:#FFFFFF; --accent:#FFFFFF; --node-bg:#000000; --core-bg:#000000; --ghost:#FFFFFF; --ink:#FFFFFF; --paper:#000000; --ghost:#FFFFFF; }
</style>

  <defs>
    <mask id="node-cutouts" maskUnits="userSpaceOnUse" x="0" y="0" width="1000" height="680">
      <rect x="0" y="0" width="1000" height="680" fill="white"/>
      <rect x="405" y="252" width="190" height="56" fill="black"/>
      <rect x="75" y="138" width="180" height="54" fill="black"/>
      <rect x="30" y="268" width="180" height="54" fill="black"/>
      <rect x="85" y="388" width="180" height="54" fill="black"/>
      <rect x="300" y="76" width="180" height="54" fill="black"/>
      <rect x="545" y="83" width="180" height="54" fill="black"/>
      <rect x="755" y="158" width="180" height="54" fill="black"/>
      <rect x="760" y="293" width="180" height="54" fill="black"/>
      <rect x="270" y="438" width="180" height="54" fill="black"/>
      <rect x="630" y="393" width="180" height="54" fill="black"/>
      <rect x="100" y="554" width="180" height="54" fill="black"/>
      <rect x="410" y="525" width="180" height="54" fill="black"/>
      <rect x="720" y="554" width="180" height="54" fill="black"/>
    </mask>
  </defs>

  <line x1="48" y1="40" x2="952" y2="40" stroke="var(--rule)"/>
  <text fill="var(--muted)" class="mono" x="48" y="28" font-size="11" letter-spacing="3.5">SYSTEM MAP — EVERYTHING FROM ONE PIPELINE</text>
  <text fill="var(--muted)" class="mono" x="952" y="28" font-size="11" letter-spacing="3.5" text-anchor="end">FIG. 01</text>

  <!-- wires -->
  <g mask="url(#node-cutouts)">
    <line class="wire w1" x1="419" y1="252" x2="244" y2="192"/>
    <line class="wire w2" x1="405" y1="284" x2="210" y2="291"/>
    <line class="wire w3" x1="433" y1="308" x2="240" y2="388"/>
    <line class="wire w4" x1="483" y1="252" x2="407" y2="130"/>
    <line class="wire w5" x1="522" y1="252" x2="614" y2="137"/>
    <line class="wire w6" x1="595" y1="254" x2="755" y2="210"/>
    <line class="wire w7" x1="595" y1="291" x2="760" y2="310"/>
    <line class="wire w8" x1="479" y1="308" x2="380" y2="438"/>
    <line class="wire w9" x1="550" y1="308" x2="678" y2="393"/>
    <line class="wire w9" x1="471" y1="308" x2="218" y2="554"/>
    <line class="wire w9" x1="500" y1="308" x2="500" y2="525"/>
    <line class="wire w9" x1="529" y1="308" x2="782" y2="554"/>
  </g>
  <g mask="url(#node-cutouts)">
    <line class="flow" x1="419" y1="252" x2="244" y2="192"/>
    <line class="flow" x1="405" y1="284" x2="210" y2="291"/>
    <line class="flow" x1="433" y1="308" x2="240" y2="388"/>
    <line class="flow" x1="483" y1="252" x2="407" y2="130"/>
    <line class="flow" x1="522" y1="252" x2="614" y2="137"/>
    <line class="flow" x1="595" y1="254" x2="755" y2="210"/>
    <line class="flow" x1="595" y1="291" x2="760" y2="310"/>
    <line class="flow" x1="479" y1="308" x2="380" y2="438"/>
    <line class="flow" x1="550" y1="308" x2="678" y2="393"/>
    <line class="flow" x1="471" y1="308" x2="218" y2="554"/>
    <line class="flow" x1="500" y1="308" x2="500" y2="525"/>
    <line class="flow" x1="529" y1="308" x2="782" y2="554"/>
  </g>

  <!-- cluster labels -->
  <text fill="var(--accent)" class="mono pop p10" x="165" y="118" font-size="10" letter-spacing="3" text-anchor="middle">TERMINAL</text>
  <text fill="var(--accent)" class="mono pop p10" x="512" y="60" font-size="10" letter-spacing="3" text-anchor="middle">WEB &amp; DATA</text>
  <text fill="var(--accent)" class="mono pop p10" x="845" y="142" font-size="10" letter-spacing="3" text-anchor="middle">iOS NATIVE</text>
  <text fill="var(--accent)" class="mono pop p10" x="500" y="603" font-size="10" letter-spacing="3" text-anchor="middle">FULL-STACK</text>
  <text fill="var(--accent)" class="mono pop p10" x="500" y="625" font-size="10" letter-spacing="3" text-anchor="middle">RESEARCH &amp; INTERNSHIPS</text>

  <!-- core -->
  <g class="pop p0">
    <rect class="nodeC" x="405" y="252" width="190" height="56" rx="2"/>
    <text fill="var(--bone)" class="mono" x="500" y="276" font-size="13" letter-spacing="2" text-anchor="middle">SHARANN.SYS</text>
    <text fill="var(--muted)" class="mono" x="500" y="294" font-size="8.5" letter-spacing="0.5" text-anchor="middle">one-person build pipeline</text>
  </g>

  <!-- nodes -->
  <g class="pop p1"><rect class="node" x="75" y="138" width="180" height="54" rx="2"/><text fill="var(--bone)" class="mono" x="165" y="161" font-size="12" letter-spacing="1" text-anchor="middle">cosmos</text><text fill="var(--muted)" class="mono" x="165" y="180" font-size="9" letter-spacing="1" text-anchor="middle">AI chat · 25+ models</text></g>
  <g class="pop p2"><rect class="node" x="30" y="268" width="180" height="54" rx="2"/><text fill="var(--bone)" class="mono" x="120" y="291" font-size="12" letter-spacing="1" text-anchor="middle">terminaltype</text><text fill="var(--muted)" class="mono" x="120" y="310" font-size="9" letter-spacing="1" text-anchor="middle">typing test · live WPM</text></g>
  <g class="pop p3"><rect class="node" x="85" y="388" width="180" height="54" rx="2"/><text fill="var(--bone)" class="mono" x="175" y="411" font-size="12" letter-spacing="1" text-anchor="middle">billing system</text><text fill="var(--muted)" class="mono" x="175" y="430" font-size="9" letter-spacing="1" text-anchor="middle">internship · GeoPacific</text></g>
  <g class="pop p4"><rect class="node" x="300" y="76" width="180" height="54" rx="2"/><text fill="var(--bone)" class="mono" x="390" y="99" font-size="12" letter-spacing="1" text-anchor="middle">kern</text><text fill="var(--muted)" class="mono" x="390" y="118" font-size="9" letter-spacing="1" text-anchor="middle">data OS · MCP server</text></g>
  <g class="pop p5"><rect class="node" x="545" y="83" width="180" height="54" rx="2"/><text fill="var(--bone)" class="mono" x="635" y="106" font-size="12" letter-spacing="1" text-anchor="middle">lobe</text><text fill="var(--muted)" class="mono" x="635" y="125" font-size="9" letter-spacing="1" text-anchor="middle">knowledge OS · web</text></g>
  <g class="pop p6"><rect class="node" x="755" y="158" width="180" height="54" rx="2"/><text fill="var(--bone)" class="mono" x="845" y="181" font-size="12" letter-spacing="1" text-anchor="middle">notionwidgets</text><text fill="var(--muted)" class="mono" x="845" y="200" font-size="9" letter-spacing="1" text-anchor="middle">WidgetKit · Notion API</text></g>
  <g class="pop p7"><rect class="node" x="760" y="293" width="180" height="54" rx="2"/><text fill="var(--bone)" class="mono" x="850" y="316" font-size="12" letter-spacing="1" text-anchor="middle">planner</text><text fill="var(--muted)" class="mono" x="850" y="335" font-size="9" letter-spacing="1" text-anchor="middle">SwiftUI · Core Data</text></g>
  <g class="pop p8"><rect class="node" x="270" y="438" width="180" height="54" rx="2"/><text fill="var(--bone)" class="mono" x="360" y="461" font-size="12" letter-spacing="1" text-anchor="middle">student dashboard</text><text fill="var(--muted)" class="mono" x="360" y="480" font-size="9" letter-spacing="1" text-anchor="middle">VIT · academic tools</text></g>
  <g class="pop p9"><rect class="node" x="630" y="393" width="180" height="54" rx="2"/><text fill="var(--bone)" class="mono" x="720" y="416" font-size="12" letter-spacing="1" text-anchor="middle">landroid</text><text fill="var(--muted)" class="mono" x="720" y="435" font-size="9" letter-spacing="1" text-anchor="middle">drone NDVI · GeoTIFF</text></g>

  <!-- new nodes: internship + research cluster at bottom -->
  <g class="pop p11"><rect class="node" x="100" y="554" width="180" height="54" rx="2"/><text fill="var(--bone)" class="mono" x="190" y="577" font-size="12" letter-spacing="1" text-anchor="middle">api keychain</text><text fill="var(--muted)" class="mono" x="190" y="596" font-size="9" letter-spacing="1" text-anchor="middle">LLM gateway · live</text></g>
  <g class="pop p12"><rect class="node" x="410" y="525" width="180" height="54" rx="2"/><text fill="var(--bone)" class="mono" x="500" y="548" font-size="12" letter-spacing="1" text-anchor="middle">proposalOS</text><text fill="var(--muted)" class="mono" x="500" y="567" font-size="9" letter-spacing="1" text-anchor="middle">RFP platform · Ambian</text></g>
  <g class="pop p13"><rect class="node" x="720" y="554" width="180" height="54" rx="2"/><text fill="var(--bone)" class="mono" x="810" y="577" font-size="12" letter-spacing="1" text-anchor="middle">hallucination det.</text><text fill="var(--muted)" class="mono" x="810" y="596" font-size="9" letter-spacing="1" text-anchor="middle">SRIP 2026 · VIT</text></g>

  <line x1="48" y1="650" x2="952" y2="650" stroke="var(--rule)"/>
  <text fill="var(--dim)" class="mono" x="952" y="672" font-size="10" letter-spacing="2" text-anchor="end">DASHED LINES — DATA IN MOTION</text>
</svg>
